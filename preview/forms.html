<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260425b" />

<style id="__inline_tokens">
:root{
  --cream:#F5F0E8; --blush:#E8D4C6; --gold:#C8922A; --gold-deep:#A8791E;
  --sage:#8FA68E; --terra:#C57B57; --stone:#2B2620; --stone-soft:#4A4037;
  --pale-sky:#D4DEE2;
  --ok-deep:#1A2A3A; --ok-falls:#3A6878; --ok-mist:#8EB8C2; --ok-reach:#B8D8E4; --ok-sky:#D4DEE2;
  --stone-900:#1a1713; --stone-700:#3A322B; --stone-500:#6C6258; --stone-400:#8A8178;
  --stone-300:#AFA79D; --stone-200:#CEC7BD; --stone-100:#E8E4DC; --paper:#FFFFFF;
  --ink:var(--stone); --foundation:var(--stone); --bone:var(--stone-100); --linen:var(--stone-100);
  --interior:var(--cream); --touch:var(--blush); --hearth:var(--terra);
  --amber:var(--gold); --amber-deep:var(--gold-deep); --moss:var(--sage); --moss-soft:var(--sage);
  --moss-deep:#2A3D28; --refuge-forest:#2A3D28; --garden:var(--sage);
  --bg:var(--cream); --bg-alt:var(--blush); --bg-panel:var(--stone-100); --bg-inverse:var(--stone); --bg-brand:var(--gold);
  --fg:var(--stone); --fg-muted:var(--stone-soft); --fg-subtle:var(--stone-400); --fg-inverse:var(--cream);
  --fg-brand:var(--gold-deep); --fg-accent:var(--terra);
  --border:rgba(43,38,32,0.14); --border-soft:rgba(43,38,32,0.07); --divider:rgba(43,38,32,0.18);
  --shadow-sm:0 1px 2px rgba(43,38,32,0.06),0 1px 1px rgba(43,38,32,0.04);
  --shadow-md:0 14px 40px -12px rgba(43,38,32,0.25);
  --shadow-lg:0 24px 60px -30px rgba(43,38,32,0.25);
  --font-serif:"Cormorant Garamond","EB Garamond",Georgia,serif;
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-serif-ko:"Noto Serif KR","Cormorant Garamond",serif;
  --font-sans-ko:"Noto Sans KR","Inter",sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-display:var(--font-serif);
  --ko-serif-lean:500;
  --radius-none:0; --radius-xs:4px; --radius-sm:6px; --radius-md:14px; --radius-lg:28px; --radius-pill:999px;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  body { margin: 0; background: var(--cream); padding: 24px 28px; font-family: var(--font-sans); }
  .eyebrow { font-family: var(--font-sans); font-size: 11px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--stone-soft); display: inline-flex; align-items: center; gap: 10px; margin: 0 0 18px; }
  .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 600px; }
  label { display: grid; gap: 6px; }
  .lbl { font-family: var(--font-sans); font-size: 11px; font-weight: 500; letter-spacing: 0.14em; color: var(--stone-soft); text-transform: uppercase; }
  .input { font-family: var(--font-sans); font-size: 15px; padding: 12px 14px; border: 1px solid rgba(43,38,32,0.2); background: var(--paper); border-radius: 2px; color: var(--stone); }
  .input:focus { outline: 2px solid var(--gold); outline-offset: 1px; border-color: var(--stone); }
  .input::placeholder { color: var(--stone-soft); opacity: 0.6; }
  .help { font-family: var(--font-serif); font-style: italic; font-size: 13px; color: var(--stone-soft); margin-top: 12px; }
  .check { display: flex; align-items: center; gap: 10px; font-size: 14px; margin-top: 12px; color: var(--stone); }
  .check input { accent-color: var(--gold); }
</style>
</head>
<body>
  <p class="eyebrow"><span class="dot"></span>Form inputs · 입력</p>
  <div class="grid">
    <label><span class="lbl">Name · 이름</span><input class="input" value="Jinah Licari" /></label>
    <label><span class="lbl">Email</span><input class="input" placeholder="you@example.com" /></label>
    <label style="grid-column: 1 / -1"><span class="lbl">A note · 메모</span><textarea class="input" rows="2" placeholder="How can we pray for you?"></textarea></label>
  </div>
  <label class="check"><input type="checkbox" checked /> <span>Send me the monthly prayer letter.</span></label>
  <p class="help">We read every reply. No auto-responders, no drip campaigns.</p>
</body>
</html>
