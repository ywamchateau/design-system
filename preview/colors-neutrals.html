<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Neutral palette</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260425b" />

<style id="__inline_tokens">
:root{
  --cream:#F5F0E8; --blush:#E8D4C6; --gold:#C8922A; --gold-deep:#A8791E;
  --sage:#8FA68E; --terra:#C57B57; --stone:#2B2620; --stone-soft:#4A4037;
  --pale-sky:#D4DEE2;
  --ok-deep:#1A2A3A; --ok-falls:#3A6878; --ok-mist:#8EB8C2; --ok-reach:#B8D8E4; --ok-sky:#D4DEE2;
  --stone-900:#1a1713; --stone-700:#3A322B; --stone-500:#6C6258; --stone-400:#8A8178;
  --stone-300:#AFA79D; --stone-200:#CEC7BD; --stone-100:#E8E4DC; --paper:#FFFFFF;
  --ink:var(--stone); --foundation:var(--stone); --bone:var(--stone-100); --linen:var(--stone-100);
  --interior:var(--cream); --touch:var(--blush); --hearth:var(--terra);
  --amber:var(--gold); --amber-deep:var(--gold-deep); --moss:var(--sage); --moss-soft:var(--sage);
  --moss-deep:#2A3D28; --refuge-forest:#2A3D28; --garden:var(--sage);
  --bg:var(--cream); --bg-alt:var(--blush); --bg-panel:var(--stone-100); --bg-inverse:var(--stone); --bg-brand:var(--gold);
  --fg:var(--stone); --fg-muted:var(--stone-soft); --fg-subtle:var(--stone-400); --fg-inverse:var(--cream);
  --fg-brand:var(--gold-deep); --fg-accent:var(--terra);
  --border:rgba(43,38,32,0.14); --border-soft:rgba(43,38,32,0.07); --divider:rgba(43,38,32,0.18);
  --shadow-sm:0 1px 2px rgba(43,38,32,0.06),0 1px 1px rgba(43,38,32,0.04);
  --shadow-md:0 14px 40px -12px rgba(43,38,32,0.25);
  --shadow-lg:0 24px 60px -30px rgba(43,38,32,0.25);
  --font-serif:"Cormorant Garamond","EB Garamond",Georgia,serif;
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-serif-ko:"Noto Serif KR","Cormorant Garamond",serif;
  --font-sans-ko:"Noto Sans KR","Inter",sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-display:var(--font-serif);
  --ko-serif-lean:500;
  --radius-none:0; --radius-xs:4px; --radius-sm:6px; --radius-md:14px; --radius-lg:28px; --radius-pill:999px;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--cream); padding: 0; }
  .eyebrow-line {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--stone-soft);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 20px 14px;
  }
  .eyebrow-line .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .row {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    height: 150px;
    margin: 0 10px 10px;
    border: 1px solid rgba(43,38,32,0.08);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .sw {
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-right: 1px solid rgba(43,38,32,0.08);
  }
  .sw:last-child { border-right: 0; }
  .name { font-family: var(--font-serif); font-style: italic; font-size: 14px; font-weight: 500; line-height: 1.1; }
  .hex  { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.04em; opacity: 0.8; }
</style>
</head>
<body>
<div class="eyebrow-line"><span class="dot"></span>Neutrals · 중간색</div>
<div class="row">
  <div class="sw" style="background:var(--paper);color:var(--stone)"><span class="name">Paper</span><span class="hex">#FFFFFF</span></div>
  <div class="sw" style="background:var(--cream);color:var(--stone)"><span class="name">Cream</span><span class="hex">#F5F0E8</span></div>
  <div class="sw" style="background:var(--stone-100);color:var(--stone)"><span class="name">Linen</span><span class="hex">#E8E4DC</span></div>
  <div class="sw" style="background:var(--stone-300);color:var(--stone)"><span class="name">Stone 300</span><span class="hex">#AFA79D</span></div>
  <div class="sw" style="background:var(--stone-500);color:var(--cream)"><span class="name">Stone 500</span><span class="hex">#6C6258</span></div>
  <div class="sw" style="background:var(--stone-soft);color:var(--cream)"><span class="name">Stone Soft</span><span class="hex">#4A4037</span></div>
  <div class="sw" style="background:var(--stone);color:var(--cream)"><span class="name">Stone</span><span class="hex">#2B2620</span></div>
  <div class="sw" style="background:var(--stone-900);color:var(--cream)"><span class="name">Stone 900</span><span class="hex">#1A1713</span></div>
</div>
</body>
</html>
