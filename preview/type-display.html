<style id="__inline_tokens">
:root{
  --cream:#F5F0E8; --blush:#E8D4C6; --gold:#C8922A; --gold-deep:#A8791E;
  --sage:#8FA68E; --terra:#C57B57; --stone:#2B2620; --stone-soft:#4A4037;
  --pale-sky:#D4DEE2;
  --ok-deep:#1A2A3A; --ok-falls:#3A6878; --ok-mist:#8EB8C2; --ok-reach:#B8D8E4; --ok-sky:#D4DEE2;
  --stone-900:#1a1713; --stone-700:#3A322B; --stone-500:#6C6258; --stone-400:#8A8178;
  --stone-300:#AFA79D; --stone-200:#CEC7BD; --stone-100:#E8E4DC; --paper:#FFFFFF;
  --ink:var(--stone); --foundation:var(--stone); --bone:var(--stone-100); --linen:var(--stone-100);
  --interior:var(--cream); --touch:var(--blush); --hearth:var(--terra);
  --amber:var(--gold); --amber-deep:var(--gold-deep); --moss:var(--sage); --moss-soft:var(--sage);
  --moss-deep:#2A3D28; --refuge-forest:#2A3D28; --garden:var(--sage);
  --bg:var(--cream); --bg-alt:var(--blush); --bg-panel:var(--stone-100); --bg-inverse:var(--stone); --bg-brand:var(--gold);
  --fg:var(--stone); --fg-muted:var(--stone-soft); --fg-subtle:var(--stone-400); --fg-inverse:var(--cream);
  --fg-brand:var(--gold-deep); --fg-accent:var(--terra);
  --border:rgba(43,38,32,0.14); --border-soft:rgba(43,38,32,0.07); --divider:rgba(43,38,32,0.18);
  --shadow-sm:0 1px 2px rgba(43,38,32,0.06),0 1px 1px rgba(43,38,32,0.04);
  --shadow-md:0 14px 40px -12px rgba(43,38,32,0.25);
  --shadow-lg:0 24px 60px -30px rgba(43,38,32,0.25);
  --font-serif:"Cormorant Garamond","EB Garamond",Georgia,serif;
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-serif-ko:"Noto Serif KR","Cormorant Garamond",serif;
  --font-sans-ko:"Noto Sans KR","Inter",sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-display:var(--font-serif);
  --ko-serif-lean:500;
  --radius-none:0; --radius-xs:4px; --radius-sm:6px; --radius-md:14px; --radius-lg:28px; --radius-pill:999px;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<!-- Noto Serif KR is self-hosted via colors_and_type.css @font-face -->
<style>
  body { margin: 0; background: var(--cream); color: var(--stone); padding: 28px 32px; }
  .eyebrow-line {
    font-family: var(--font-sans); font-size: 11px; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--stone-soft);
    display: flex; align-items: center; gap: 10px; margin-bottom: 22px;
  }
  .eyebrow-line .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .big {
    font-family: var(--font-serif); font-weight: 500;
    font-size: 96px; line-height: 1.02; letter-spacing: -0.015em;
    margin: 0 0 10px; color: var(--stone);
  }
  .big em { font-family: var(--font-serif); font-style: italic; color: var(--terra); font-weight: 500; }
  .ko-line {
    font-family: var(--font-serif-ko); font-weight: 500;
    font-size: 72px; line-height: 1.1; letter-spacing: -0.01em;
    margin: 12px 0 18px; color: var(--stone);
    font-feature-settings: "palt";
  }
  .sub { font-family: var(--font-serif); font-style: italic; font-size: 20px; color: var(--stone-soft); margin: 0; max-width: 520px; }
  .spec { font-family: var(--font-mono); font-size: 10.5px; color: var(--stone-soft); letter-spacing: 0.04em; margin-top: 18px; }
</style>
</head>
<body>
  <span class="eyebrow-line"><span class="dot"></span>Display · Cormorant Garamond 500</span>
  <h1 class="big">One <span class="handline">Korea</span><br>starts <em>here</em>.</h1>
  <div class="ko-line">원 코리아는 여기서<br>시작됩니다.</div>
  <p class="sub">Cormorant italic in Terracotta is the brand's accent voice. Noto Serif KR (self-hosted variable) pairs at perceived equal weight.</p>
  <p class="spec">DISPLAY 96 / 100 · KO 72 / 80 · SUBHEAD 20 / 28 italic · KR 500 SELF-HOSTED</p>
</body>
