<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Radii &amp; shadow</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260425b" />

<style id="__inline_tokens">
:root{
  --cream:#F5F0E8; --blush:#E8D4C6; --gold:#C8922A; --gold-deep:#A8791E;
  --sage:#8FA68E; --terra:#C57B57; --stone:#2B2620; --stone-soft:#4A4037;
  --pale-sky:#D4DEE2;
  --ok-deep:#1A2A3A; --ok-falls:#3A6878; --ok-mist:#8EB8C2; --ok-reach:#B8D8E4; --ok-sky:#D4DEE2;
  --stone-900:#1a1713; --stone-700:#3A322B; --stone-500:#6C6258; --stone-400:#8A8178;
  --stone-300:#AFA79D; --stone-200:#CEC7BD; --stone-100:#E8E4DC; --paper:#FFFFFF;
  --ink:var(--stone); --foundation:var(--stone); --bone:var(--stone-100); --linen:var(--stone-100);
  --interior:var(--cream); --touch:var(--blush); --hearth:var(--terra);
  --amber:var(--gold); --amber-deep:var(--gold-deep); --moss:var(--sage); --moss-soft:var(--sage);
  --moss-deep:#2A3D28; --refuge-forest:#2A3D28; --garden:var(--sage);
  --bg:var(--cream); --bg-alt:var(--blush); --bg-panel:var(--stone-100); --bg-inverse:var(--stone); --bg-brand:var(--gold);
  --fg:var(--stone); --fg-muted:var(--stone-soft); --fg-subtle:var(--stone-400); --fg-inverse:var(--cream);
  --fg-brand:var(--gold-deep); --fg-accent:var(--terra);
  --border:rgba(43,38,32,0.14); --border-soft:rgba(43,38,32,0.07); --divider:rgba(43,38,32,0.18);
  --shadow-sm:0 1px 2px rgba(43,38,32,0.06),0 1px 1px rgba(43,38,32,0.04);
  --shadow-md:0 14px 40px -12px rgba(43,38,32,0.25);
  --shadow-lg:0 24px 60px -30px rgba(43,38,32,0.25);
  --font-serif:"Cormorant Garamond","EB Garamond",Georgia,serif;
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-serif-ko:"Noto Serif KR","Cormorant Garamond",serif;
  --font-sans-ko:"Noto Sans KR","Inter",sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-display:var(--font-serif);
  --ko-serif-lean:500;
  --radius-none:0; --radius-xs:4px; --radius-sm:6px; --radius-md:14px; --radius-lg:28px; --radius-pill:999px;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  body { margin: 0; background: var(--cream); padding: 22px 26px; font-family: var(--font-sans); color: var(--stone); }
  .eyebrow-line { font-family: var(--font-sans); font-size: 11px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--stone-soft); display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .eyebrow-line .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .cell { display: grid; gap: 8px; place-items: center; }
  .swatch { background: var(--paper); border: 1px solid rgba(43,38,32,0.1); width: 64px; height: 64px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; color: var(--stone-soft); text-align: center; }
</style>
</head>
<body>
  <span class="eyebrow-line"><span class="dot"></span>Radii · shadow · 둥글기</span>
  <div class="grid">
    <div class="cell"><div class="swatch" style="border-radius:0"></div><span class="lbl">0 · editorial</span></div>
    <div class="cell"><div class="swatch" style="border-radius:2px"></div><span class="lbl">2 · xs</span></div>
    <div class="cell"><div class="swatch" style="border-radius:4px"></div><span class="lbl">4 · sm</span></div>
    <div class="cell"><div class="swatch" style="border-radius:8px"></div><span class="lbl">8 · md</span></div>
    <div class="cell"><div class="swatch" style="border-radius:16px"></div><span class="lbl">16 · lg</span></div>
    <div class="cell"><div class="swatch" style="border-radius:999px; width:64px; height:28px; box-shadow: var(--shadow-md)"></div><span class="lbl">pill · tag</span></div>
  </div>
  <div class="grid" style="margin-top: 18px">
    <div class="cell"><div class="swatch" style="box-shadow: var(--shadow-sm)"></div><span class="lbl">shadow · sm</span></div>
    <div class="cell"><div class="swatch" style="box-shadow: var(--shadow-md)"></div><span class="lbl">shadow · md</span></div>
    <div class="cell"><div class="swatch" style="box-shadow: var(--shadow-lg)"></div><span class="lbl">shadow · lg</span></div>
    <div class="cell"><div class="swatch" style="border:1px solid rgba(43,38,32,0.12)"></div><span class="lbl">1px hairline</span></div>
    <div class="cell"><div class="swatch" style="background:var(--blush); border:1px solid rgba(43,38,32,0.08)"></div><span class="lbl">blush card</span></div>
    <div class="cell"><div class="swatch" style="background:var(--stone); border:0"></div><span class="lbl">stone panel</span></div>
  </div>
</body>
</html>
