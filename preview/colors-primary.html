<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Primary palette</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260425b" />

<style id="__inline_tokens">
:root{
  --cream:#F5F0E8; --blush:#E8D4C6; --gold:#C8922A; --gold-deep:#A8791E;
  --sage:#8FA68E; --terra:#C57B57; --stone:#2B2620; --stone-soft:#4A4037;
  --pale-sky:#D4DEE2;
  --ok-deep:#1A2A3A; --ok-falls:#3A6878; --ok-mist:#8EB8C2; --ok-reach:#B8D8E4; --ok-sky:#D4DEE2;
  --stone-900:#1a1713; --stone-700:#3A322B; --stone-500:#6C6258; --stone-400:#8A8178;
  --stone-300:#AFA79D; --stone-200:#CEC7BD; --stone-100:#E8E4DC; --paper:#FFFFFF;
  --ink:var(--stone); --foundation:var(--stone); --bone:var(--stone-100); --linen:var(--stone-100);
  --interior:var(--cream); --touch:var(--blush); --hearth:var(--terra);
  --amber:var(--gold); --amber-deep:var(--gold-deep); --moss:var(--sage); --moss-soft:var(--sage);
  --moss-deep:#2A3D28; --refuge-forest:#2A3D28; --garden:var(--sage);
  --bg:var(--cream); --bg-alt:var(--blush); --bg-panel:var(--stone-100); --bg-inverse:var(--stone); --bg-brand:var(--gold);
  --fg:var(--stone); --fg-muted:var(--stone-soft); --fg-subtle:var(--stone-400); --fg-inverse:var(--cream);
  --fg-brand:var(--gold-deep); --fg-accent:var(--terra);
  --border:rgba(43,38,32,0.14); --border-soft:rgba(43,38,32,0.07); --divider:rgba(43,38,32,0.18);
  --shadow-sm:0 1px 2px rgba(43,38,32,0.06),0 1px 1px rgba(43,38,32,0.04);
  --shadow-md:0 14px 40px -12px rgba(43,38,32,0.25);
  --shadow-lg:0 24px 60px -30px rgba(43,38,32,0.25);
  --font-serif:"Cormorant Garamond","EB Garamond",Georgia,serif;
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-serif-ko:"Noto Serif KR","Cormorant Garamond",serif;
  --font-sans-ko:"Noto Sans KR","Inter",sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-display:var(--font-serif);
  --ko-serif-lean:500;
  --radius-none:0; --radius-xs:4px; --radius-sm:6px; --radius-md:14px; --radius-lg:28px; --radius-pill:999px;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500&family=Noto+Serif+KR:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  body { margin: 0; background: var(--cream); color: var(--stone); padding: 20px; }
  .eyebrow-line {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--stone-soft);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .eyebrow-line .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .row { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; }
  .sw {
    padding: 14px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 170px;
    border-radius: var(--radius-md);
    background: var(--paper);
    border: 1px solid rgba(43,38,32,0.08);
  }
  .chip { width: 100%; height: 64px; border-radius: 8px; margin-bottom: 8px; }
  .ko { font-family: 'Noto Serif KR', serif; font-weight: 500; font-size: 12px; line-height: 1.2; color: var(--stone); }
  .en { font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: 13px; line-height: 1.2; color: var(--stone); }
  .hex { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.04em; color: var(--stone-soft); }
  .role { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--stone-soft); line-height: 1.3; margin-top: 2px; }
</style>
</head>
<body>
<span class="eyebrow-line"><span class="dot"></span>Primary palette · 주요 팔레트</span>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--cream);border:1px solid rgba(43,38,32,0.1)"></div>
    <span class="ko">크림</span><span class="en">Cream</span><span class="hex">#F5F0E8</span><span class="role">Canvas</span></div>
  <div class="sw"><div class="chip" style="background:var(--blush)"></div>
    <span class="ko">블러시</span><span class="en">Blush</span><span class="hex">#E8D4C6</span><span class="role">Panel · Card</span></div>
  <div class="sw"><div class="chip" style="background:var(--gold)"></div>
    <span class="ko">골드</span><span class="en">Gold</span><span class="hex">#C8922A</span><span class="role">CTA · Fire</span></div>
  <div class="sw"><div class="chip" style="background:var(--gold-deep)"></div>
    <span class="ko">짙은 골드</span><span class="en">Gold Deep</span><span class="hex">#A8791E</span><span class="role">CTA hover</span></div>
  <div class="sw"><div class="chip" style="background:var(--sage)"></div>
    <span class="ko">세이지</span><span class="en">Sage</span><span class="hex">#8FA68E</span><span class="role">Quiet · UI</span></div>
  <div class="sw"><div class="chip" style="background:var(--terra)"></div>
    <span class="ko">테라코타</span><span class="en">Terracotta</span><span class="hex">#C57B57</span><span class="role">Italic accent</span></div>
  <div class="sw"><div class="chip" style="background:var(--stone)"></div>
    <span class="ko">스톤</span><span class="en">Stone</span><span class="hex">#2B2620</span><span class="role">Ink · Header</span></div>
  <div class="sw"><div class="chip" style="background:var(--stone-soft)"></div>
    <span class="ko">연한 스톤</span><span class="en">Stone Soft</span><span class="hex">#4A4037</span><span class="role">Muted body</span></div>
  <div class="sw"><div class="chip" style="background:var(--pale-sky)"></div>
    <span class="ko">페일 스카이</span><span class="en">Pale Sky</span><span class="hex">#D4DEE2</span><span class="role">Cool accent</span></div>
</div>
</body>
</html>
