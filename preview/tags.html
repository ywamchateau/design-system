<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tags &amp; badges</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260425b" />

<style id="__inline_tokens">
:root{
  --cream:#F5F0E8; --blush:#E8D4C6; --gold:#C8922A; --gold-deep:#A8791E;
  --sage:#8FA68E; --terra:#C57B57; --stone:#2B2620; --stone-soft:#4A4037;
  --pale-sky:#D4DEE2;
  --ok-deep:#1A2A3A; --ok-falls:#3A6878; --ok-mist:#8EB8C2; --ok-reach:#B8D8E4; --ok-sky:#D4DEE2;
  --stone-900:#1a1713; --stone-700:#3A322B; --stone-500:#6C6258; --stone-400:#8A8178;
  --stone-300:#AFA79D; --stone-200:#CEC7BD; --stone-100:#E8E4DC; --paper:#FFFFFF;
  --ink:var(--stone); --foundation:var(--stone); --bone:var(--stone-100); --linen:var(--stone-100);
  --interior:var(--cream); --touch:var(--blush); --hearth:var(--terra);
  --amber:var(--gold); --amber-deep:var(--gold-deep); --moss:var(--sage); --moss-soft:var(--sage);
  --moss-deep:#2A3D28; --refuge-forest:#2A3D28; --garden:var(--sage);
  --bg:var(--cream); --bg-alt:var(--blush); --bg-panel:var(--stone-100); --bg-inverse:var(--stone); --bg-brand:var(--gold);
  --fg:var(--stone); --fg-muted:var(--stone-soft); --fg-subtle:var(--stone-400); --fg-inverse:var(--cream);
  --fg-brand:var(--gold-deep); --fg-accent:var(--terra);
  --border:rgba(43,38,32,0.14); --border-soft:rgba(43,38,32,0.07); --divider:rgba(43,38,32,0.18);
  --shadow-sm:0 1px 2px rgba(43,38,32,0.06),0 1px 1px rgba(43,38,32,0.04);
  --shadow-md:0 14px 40px -12px rgba(43,38,32,0.25);
  --shadow-lg:0 24px 60px -30px rgba(43,38,32,0.25);
  --font-serif:"Cormorant Garamond","EB Garamond",Georgia,serif;
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-serif-ko:"Noto Serif KR","Cormorant Garamond",serif;
  --font-sans-ko:"Noto Sans KR","Inter",sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-display:var(--font-serif);
  --ko-serif-lean:500;
  --radius-none:0; --radius-xs:4px; --radius-sm:6px; --radius-md:14px; --radius-lg:28px; --radius-pill:999px;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  body { margin: 0; background: var(--cream); padding: 24px 28px; font-family: var(--font-sans); }
  .eyebrow-line { font-family: var(--font-sans); font-size: 11px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--stone-soft); display: inline-flex; align-items: center; gap: 10px; margin: 0 0 14px; }
  .eyebrow-line .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; align-items: center; }
  .tag { font-family: var(--font-sans); font-size: 10.5px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; padding: 6px 12px; border-radius: 999px; border: 1px solid rgba(43,38,32,0.2); color: var(--stone); background: transparent; }
  .tag.gold { background: var(--gold); color: var(--paper); border-color: transparent; }
  .tag.sage { background: var(--sage); color: var(--paper); border-color: transparent; }
  .tag.terra { background: var(--terra); color: var(--paper); border-color: transparent; }
  .tag.blush { background: var(--blush); color: var(--stone); border-color: transparent; }
  .tag.stone { background: var(--stone); color: var(--cream); border-color: transparent; }
  .chip { font-family: var(--font-sans); font-size: 12px; color: var(--stone); display: inline-flex; align-items: center; gap: 8px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .divider { height: 1px; background: rgba(43,38,32,0.12); margin: 14px 0; }
  .fact-chip { display: inline-flex; align-items: baseline; gap: 10px; background: var(--paper); border: 1px solid rgba(43,38,32,0.1); box-shadow: var(--shadow-md); padding: 10px 16px; border-radius: 2px; }
  .fact-chip .num { font-family: var(--font-serif); font-weight: 500; font-size: 24px; color: var(--stone); line-height: 1; }
  .fact-chip .num em { font-style: italic; color: var(--terra); }
  .fact-chip .lbl { font-family: var(--font-sans); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--stone-soft); }
</style>
</head>
<body>
  <p class="eyebrow-line"><span class="dot"></span>Tags &amp; status · 태그</p>
  <div class="row">
    <span class="tag gold">Featured</span>
    <span class="tag sage">DTS</span>
    <span class="tag terra">One Korea</span>
    <span class="tag blush">Korean</span>
    <span class="tag stone">Staff</span>
    <span class="tag">Outline</span>
  </div>
  <div class="row">
    <span class="chip"><span class="dot" style="background: var(--sage)"></span>Now</span>
    <span class="chip"><span class="dot" style="background: var(--gold)"></span>Upcoming</span>
    <span class="chip"><span class="dot" style="background: var(--stone-300)"></span>Past</span>
  </div>
  <div class="divider"></div>
  <p class="eyebrow-line"><span class="dot"></span>Fact chip · 지표</p>
  <div class="row">
    <span class="fact-chip"><span class="num"><em>6</em></span><span class="lbl">Pastors · 목사</span></span>
    <span class="fact-chip"><span class="num">$58K</span><span class="lbl">Team contributed</span></span>
  </div>
</body>
</html>
