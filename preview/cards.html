<style id="__inline_tokens">
:root{
  --cream:#F5F0E8; --blush:#E8D4C6; --gold:#C8922A; --gold-deep:#A8791E;
  --sage:#8FA68E; --terra:#C57B57; --stone:#2B2620; --stone-soft:#4A4037;
  --pale-sky:#D4DEE2;
  --ok-deep:#1A2A3A; --ok-falls:#3A6878; --ok-mist:#8EB8C2; --ok-reach:#B8D8E4; --ok-sky:#D4DEE2;
  --stone-900:#1a1713; --stone-700:#3A322B; --stone-500:#6C6258; --stone-400:#8A8178;
  --stone-300:#AFA79D; --stone-200:#CEC7BD; --stone-100:#E8E4DC; --paper:#FFFFFF;
  --ink:var(--stone); --foundation:var(--stone); --bone:var(--stone-100); --linen:var(--stone-100);
  --interior:var(--cream); --touch:var(--blush); --hearth:var(--terra);
  --amber:var(--gold); --amber-deep:var(--gold-deep); --moss:var(--sage); --moss-soft:var(--sage);
  --moss-deep:#2A3D28; --refuge-forest:#2A3D28; --garden:var(--sage);
  --bg:var(--cream); --bg-alt:var(--blush); --bg-panel:var(--stone-100); --bg-inverse:var(--stone); --bg-brand:var(--gold);
  --fg:var(--stone); --fg-muted:var(--stone-soft); --fg-subtle:var(--stone-400); --fg-inverse:var(--cream);
  --fg-brand:var(--gold-deep); --fg-accent:var(--terra);
  --border:rgba(43,38,32,0.14); --border-soft:rgba(43,38,32,0.07); --divider:rgba(43,38,32,0.18);
  --shadow-sm:0 1px 2px rgba(43,38,32,0.06),0 1px 1px rgba(43,38,32,0.04);

  --font-serif:"Cormorant Garamond","EB Garamond",Georgia,serif;
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-serif-ko:"Noto Serif KR","Cormorant Garamond",serif;
  --font-sans-ko:"Noto Sans KR","Inter",sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  body { margin: 0; background: var(--cream); padding: 22px 24px; font-family: var(--font-sans); }
  .eyebrow { font-family: var(--font-sans); font-size: 11px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--stone-soft); display: inline-flex; align-items: center; gap: 10px; margin: 0 0 16px; }
  .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: var(--paper); border: 1px solid rgba(43,38,32,0.08); border-radius: var(--radius-md); padding: 20px 22px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 10px; }
  .tag { font-family: var(--font-sans); font-size: 10.5px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stone-soft); display: inline-flex; align-items: center; gap: 8px; }
  .tag .d { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .tag .d.sage { background: var(--sage); }
  .tag .d.terra { background: var(--terra); }
  .t { font-family: var(--font-serif); font-weight: 500; font-size: 24px; margin: 0; line-height: 1.15; color: var(--stone); letter-spacing: -0.01em; }
  .t em { font-style: italic; color: var(--terra); font-weight: 500; }
  .d { font-family: var(--font-sans); font-size: 14px; color: var(--stone-soft); margin: 0; line-height: 1.55; }
  .card-stone { background: var(--stone); color: var(--cream); border: 0; }
  .card-stone .tag { color: rgba(245,240,232,0.75); }
  .card-stone .t { color: var(--cream); }
  .card-stone .d { color: rgba(245,240,232,0.8); }
</style>
</head>
<body>
  <p class="eyebrow"><span class="dot"></span>Cards · 카드</p>
<div class="grid">
  <div class="card">
    <span class="tag"><span class="d sage"></span>Program · 프로그램</span>
    <h3 class="t">Discipleship <em>Training</em> School</h3>
    <p class="d">A foundational six-month program to deepen faith and prepare young people for the field.</p>
  </div>
  <div class="card card-stone">
    <span class="tag"><span class="d"></span>Next event · 다가오는</span>
    <h3 class="t">One Korea <em>Testimony</em> Night</h3>
    <p class="d">Six pastors. Six escapes. One God who breathes life into what the world called dead.</p>
  </div>
</div>
</body>
