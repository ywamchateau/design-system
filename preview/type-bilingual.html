<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Bilingual pairing</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260428a" />

<style id="__inline_tokens">
:root{
  --cream:#F5F0E8; --blush:#E8D4C6; --gold:#C8922A; --gold-deep:#A8791E;
  --sage:#8FA68E; --terra:#C57B57; --stone:#2B2620; --stone-soft:#4A4037;
  --pale-sky:#D4DEE2;
  --ok-deep:#1A2A3A; --ok-falls:#3A6878; --ok-mist:#8EB8C2; --ok-reach:#B8D8E4; --ok-sky:#D4DEE2;
  --stone-900:#1a1713; --stone-700:#3A322B; --stone-500:#6C6258; --stone-400:#8A8178;
  --stone-300:#AFA79D; --stone-200:#CEC7BD; --stone-100:#E8E4DC; --paper:#FFFFFF;
  --ink:var(--stone); --foundation:var(--stone); --bone:var(--stone-100); --linen:var(--stone-100);
  --interior:var(--cream); --touch:var(--blush); --hearth:var(--terra);
  --amber:var(--gold); --amber-deep:var(--gold-deep); --moss:var(--sage); --moss-soft:var(--sage);
  --moss-deep:#2A3D28; --refuge-forest:#2A3D28; --garden:var(--sage);
  --bg:var(--cream); --bg-alt:var(--blush); --bg-panel:var(--stone-100); --bg-inverse:var(--stone); --bg-brand:var(--gold);
  --fg:var(--stone); --fg-muted:var(--stone-soft); --fg-subtle:var(--stone-400); --fg-inverse:var(--cream);
  --fg-brand:var(--gold-deep); --fg-accent:var(--terra);
  --border:rgba(43,38,32,0.14); --border-soft:rgba(43,38,32,0.07); --divider:rgba(43,38,32,0.18);
  --shadow-sm:0 1px 2px rgba(43,38,32,0.06),0 1px 1px rgba(43,38,32,0.04);
  --shadow-md:0 14px 40px -12px rgba(43,38,32,0.25);
  --shadow-lg:0 24px 60px -30px rgba(43,38,32,0.25);
  --font-serif:"Cormorant Garamond","EB Garamond",Georgia,serif;
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-serif-ko:"Noto Serif KR","Cormorant Garamond",serif;
  --font-sans-ko:"Noto Sans KR","Inter",sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --font-display:var(--font-serif);
  --ko-serif-lean:500;
  --radius-none:0; --radius-xs:4px; --radius-sm:6px; --radius-md:14px; --radius-lg:28px; --radius-pill:999px;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<!-- Noto Serif KR + Noto Sans KR are self-hosted via colors_and_type.css @font-face -->
<style>
  body { margin: 0; background: var(--stone); color: var(--cream); padding: 28px 32px; font-family: var(--font-sans); min-height: 100vh; }
  .eyebrow {
    font-family: var(--font-sans); font-size: 11px; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase; color: rgba(245,240,232,0.7);
    display: inline-flex; align-items: center; gap: 12px; margin: 0 0 22px;
  }
  .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .pair { display: grid; gap: 6px; margin-bottom: 28px; }
  .en { font-family: var(--font-serif); font-weight: 500; font-size: 42px; line-height: 1.08; letter-spacing: -0.01em; color: var(--cream); }
  .ko { font-family: var(--font-serif-ko); font-weight: 500; font-size: 42px; line-height: 1.15; letter-spacing: -0.005em; color: var(--cream); font-feature-settings: "palt"; }
  .small {
    font-family: var(--font-serif); font-style: italic;
    font-size: 14px; color: rgba(245,240,232,0.75);
    max-width: 58ch; line-height: 1.6;
  }
  .small .ko-s { display: block; font-family: var(--font-sans-ko); font-style: normal; margin-top: 6px; font-size: 13px; }
</style>
</head>
<body>
  <p class="eyebrow"><span class="dot"></span>Bilingual pairing · 이중언어</p>
  <div class="pair">
    <span class="en">One Korea Testimony Night</span>
    <span class="ko">원 코리아 테스티모니 나잇</span>
  </div>
  <p class="small">
    Same size, same color. The Korean serif is leaned one weight heavier (500) to achieve perceived equal presence against Cormorant 500. Both KR families are self-hosted variable fonts.
    <span class="ko-s">같은 크기, 같은 색. 한국어 명조체는 광학적 균형을 위해 한 단계 굵게 설정됩니다.</span>
  </p>
</body>
</html>
