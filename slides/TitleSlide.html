<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-serif); background: #000; display: grid; place-items: center; }
  .slide {
    width: 1280px; height: 720px;
    background: var(--stone); color: var(--cream);
    position: relative; overflow: hidden;
    padding: 72px 80px; box-sizing: border-box;
  }
  .slide::before {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(245,240,232,.05) 1px, transparent 1px);
    background-size: 3px 3px; pointer-events: none;
  }
  .mark {
    position: absolute; top: 40px; right: 80px;
    font-family: var(--font-sans); font-weight: 500;
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(245,240,232,0.75);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .mark .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .eye {
    position: absolute; top: 72px; left: 80px;
    font-family: var(--font-sans); font-weight: 500;
    font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(245,240,232,0.72);
    display: inline-flex; align-items: center; gap: 14px;
  }
  .eye::before { content: ""; display: inline-block; width: 40px; height: 1px; background: rgba(245,240,232,0.5); }
  .title {
    position: absolute; left: 80px; bottom: 222px;
    font-family: var(--font-serif); font-weight: 500;
    font-size: 112px; line-height: 1.0; letter-spacing: -0.018em;
    margin: 0; max-width: 17ch; color: var(--cream);
  }
  .title em { font-family: var(--font-serif); font-style: italic; color: var(--terra); font-weight: 500; }
  .ko {
    position: absolute; left: 80px; bottom: 160px;
    font-family: 'Noto Serif KR', serif; font-weight: 500;
    font-size: 34px; color: rgba(245,240,232,0.8); margin: 0;
    letter-spacing: -0.005em;
  }
  .meta {
    position: absolute; bottom: 64px; left: 80px;
    display: flex; gap: 48px;
    font-family: var(--font-sans); font-weight: 500;
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(245,240,232,0.7);
  }
  .page {
    position: absolute; bottom: 40px; right: 80px;
    font-family: var(--font-mono); font-size: 12px;
    letter-spacing: 0.08em; color: rgba(245,240,232,0.55);
  }
</style>
</head>
<body>
  <div class="slide">
    <span class="mark"><span class="dot"></span>YWAM Château</span>
    <div class="eye">Vision Document · 2026</div>
    <h1 class="title">Draw near. Be transformed. <em>Live His Mission.</em></h1>
    <p class="ko">가까이 다가가라. 변화되어라.</p>
    <div class="meta">
      <span>November XX</span>
      <span>Vince &amp; Jinah Licari</span>
      <span>Route de Saint-Amour 16</span>
    </div>
    <span class="page">01 / 08</span>
  </div>
</body>
