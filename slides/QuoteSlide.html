<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; }
  body { background: #000; display: grid; place-items: center; font-family: var(--font-sans); }
  .slide {
    width: 1280px; height: 720px;
    background: var(--stone); color: var(--cream);
    position: relative; padding: 104px 128px; box-sizing: border-box;
  }
  .slide::before {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(245,240,232,.04) 1px, transparent 1px);
    background-size: 3px 3px; pointer-events: none;
  }
  .eye {
    font-family: var(--font-sans); font-weight: 500;
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(245,240,232,0.75);
    display: inline-flex; align-items: center; gap: 12px;
    position: relative;
  }
  .eye .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  blockquote {
    font-family: var(--font-serif); font-style: italic; font-weight: 500;
    font-size: 68px; line-height: 1.12;
    margin: 36px 0 0; padding: 0; border: 0;
    max-width: 22ch; color: var(--cream); position: relative;
  }
  blockquote::before {
    content: "\201C";
    font-family: var(--font-serif); font-style: normal;
    position: absolute; left: -0.55em; top: -0.2em;
    color: var(--terra); font-size: 1.2em;
  }
  blockquote em { color: var(--terra); font-style: italic; font-weight: 500; }
  .ko {
    font-family: 'Noto Serif KR', serif; font-weight: 500;
    font-size: 22px; color: rgba(245,240,232,0.7); margin: 28px 0 0;
    max-width: 30ch; letter-spacing: -0.005em;
  }
  .who {
    position: absolute; bottom: 108px; left: 128px;
    font-family: var(--font-sans); font-weight: 500;
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--gold);
    display: inline-flex; align-items: center; gap: 14px;
  }
  .who::before { content: ""; display: inline-block; width: 32px; height: 1px; background: var(--gold); }
  .foot {
    position: absolute; left: 128px; right: 128px; bottom: 52px;
    display: flex; justify-content: space-between;
    font-family: var(--font-mono); font-size: 12px;
    letter-spacing: 0.06em; color: rgba(245,240,232,0.5);
  }
</style>
</head>
<body>
  <div class="slide">
    <span class="eye"><span class="dot"></span>One Korea · Testimony</span>
    <blockquote>He <em>breathes life</em> into what the world called dead.</blockquote>
    <p class="ko">세상이 죽었다고 한 것에 그분은 생명을 불어넣으신다.</p>
    <span class="who">From the testimony of Pastor K.</span>
    <div class="foot">
      <span>YWAM Château</span>
      <span>05 / 08</span>
    </div>
  </div>
</body>
