<style>
  html, body { margin: 0; height: 100%; }
  body { background: #000; display: grid; place-items: center; font-family: var(--font-sans); }
  .slide {
    width: 1280px; height: 720px;
    background: var(--cream); color: var(--stone);
    position: relative; padding: 96px 104px; box-sizing: border-box;
  }
  .num {
    font-family: var(--font-sans); font-weight: 500;
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--stone-soft);
    display: inline-flex; align-items: center; gap: 12px;
  }
  .num .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .rule { height: 1px; background: rgba(43,38,32,0.2); width: 120px; margin: 28px 0 44px; }
  .big {
    font-family: var(--font-serif); font-weight: 500;
    font-size: 124px; line-height: 1.0; letter-spacing: -0.018em;
    margin: 0; max-width: 14ch; color: var(--stone);
  }
  .big em { font-style: italic; color: var(--terra); font-weight: 500; }
  .ko {
    font-family: 'Noto Serif KR', serif; font-weight: 500;
    font-size: 32px; color: var(--stone-soft); margin-top: 30px;
    letter-spacing: -0.005em;
  }
  .foot {
    position: absolute; left: 104px; right: 104px; bottom: 52px;
    display: flex; justify-content: space-between;
    font-family: var(--font-mono); font-size: 12px;
    letter-spacing: 0.06em; color: var(--stone-soft);
  }
</style>
</head>
<body>
  <div class="slide">
    <span class="num"><span class="dot"></span>02 — Mission · 사명</span>
    <div class="rule"></div>
    <h1 class="big">A family home<br/>for <em>testimony,</em> <em>training,</em><br/>and presence.</h1>
    <p class="ko">증언, 훈련, 그리고 임재의 집.</p>
    <div class="foot">
      <span>YWAM Château</span>
      <span>02 / 08</span>
    </div>
  </div>
